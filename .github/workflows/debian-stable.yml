          env-names: "AWS_REGION, AWS_ROLE_ECR_PUBLIC_RW, DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, QUAY_USERNAME, QUAY_TOKEN"

      - name: Configure AWS credentials
        if: ${{ github.event_name != 'pull_request' }}
