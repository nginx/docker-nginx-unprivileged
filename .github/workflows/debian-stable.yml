        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ECR_PUBLIC_RW }}
          role-duration-seconds: 14400

      - name: Login to Amazon ECR Public Gallery
        if: ${{ github.event_name != 'pull_request' }}
